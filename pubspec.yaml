name: tours_express_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  universal_html: ^2.2.4
  pdf: ^3.11.0
  path_provider: ^2.1.0
  http: ^1.2.0
  intl: ^0.19.0
  printing: ^5.12.0
  share_plus: ^10.0.0
  flutter_native_splash: ^2.3.5
  flutter:
    sdk: flutter

  logger: ^2.0.2
  url_launcher: ^6.2.5
  # font_awesome_flutter: ^10.4.0
  # icons_plus: ^5.0.0
  cupertino_icons: ^1.0.8
  video_player: ^2.7.0
  carousel_slider: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21